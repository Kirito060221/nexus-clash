<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEXUS CLASH — LoL風ミニMOBA</title>
<style>
  :root{
    --map-night:#0d1512; --panel:#121b22; --panel2:#0b1116;
    --ally:#4da3ff; --enemy:#ff5c5c; --gold:#e8c15a; --hp:#4fd06a; --mana:#3f8fe0;
    --ink:#e8eef2; --dim:#8ba0ad; --line:#25333d;
  }
  *{box-sizing:border-box; margin:0; padding:0; user-select:none; -webkit-user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--map-night);
    font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;color:var(--ink);}
  canvas{display:block;}
  #game{position:fixed;inset:0;cursor:crosshair;}
  .mono{font-family:Consolas,"Courier New",monospace;}

  /* ======= チャンピオン選択画面 ======= */
  #select{position:fixed;inset:0;background:
      radial-gradient(1200px 700px at 50% -10%, #1b3a2c 0%, transparent 60%),
      radial-gradient(900px 600px at 85% 110%, #3a1b1b 0%, transparent 55%),
      var(--map-night);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;z-index:50;padding:20px;}
  #select h1{font-size:44px;letter-spacing:.14em;font-weight:900;
    background:linear-gradient(180deg,#ffffff,#9fd3ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #select .sub{color:var(--dim);letter-spacing:.35em;font-size:12px;margin-top:-18px;}
  #cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:1100px;}
  .card{width:230px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;}
  .card:hover{transform:translateY(-4px);border-color:#3d5566;}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold), 0 10px 30px rgba(232,193,90,.15);}
  .emblem{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:30px;font-weight:900;margin:0 auto 10px;color:#fff;border:3px solid rgba(255,255,255,.85);}
  .card h3{text-align:center;font-size:18px;}
  .role{text-align:center;color:var(--gold);font-size:11px;letter-spacing:.25em;margin:2px 0 10px;}
  .skills{font-size:11.5px;color:var(--dim);line-height:1.55;}
  .skills b{color:var(--ink);}
  #startBtn{padding:12px 64px;font-size:18px;font-weight:800;letter-spacing:.2em;color:#0d1512;
    background:linear-gradient(180deg,#ffe9ad,var(--gold));border:none;border-radius:8px;cursor:pointer;opacity:.35;pointer-events:none;
    transition:opacity .15s;}
  #startBtn.on{opacity:1;pointer-events:auto;}
  #startBtn.on:hover{filter:brightness(1.08);}
  #selHint{color:var(--dim);font-size:12.5px;text-align:center;line-height:1.8;}
  #selHint kbd{background:#1c2830;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:1px 7px;font-size:11px;color:var(--ink);}

  /* ======= HUD ======= */
  #hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10;}
  #topbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;
    background:rgba(11,17,22,.82);border:1px solid var(--line);border-radius:8px;padding:5px 16px;}
  #topbar .tk{font-weight:900;font-size:18px;}
  #topbar .blue{color:var(--ally);} #topbar .red{color:var(--enemy);}
  #clock{color:var(--dim);font-size:13px;min-width:44px;text-align:center;}

  #announce{position:absolute;top:16%;left:0;right:0;text-align:center;font-size:34px;font-weight:900;letter-spacing:.12em;
    text-shadow:0 2px 14px rgba(0,0,0,.7);opacity:0;transition:opacity .25s;}
  #toast{position:absolute;bottom:190px;left:50%;transform:translateX(-50%);font-size:13px;color:#ffd7d7;
    text-shadow:0 1px 6px #000;opacity:0;transition:opacity .2s;}

  #feed{position:absolute;top:52px;right:12px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
  .feedrow{background:rgba(11,17,22,.8);border:1px solid var(--line);border-radius:6px;padding:3px 10px;font-size:12px;}
  .fb{color:var(--ally);font-weight:700;} .fr{color:var(--enemy);font-weight:700;}

  /* 下部コンソール */
  #console{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;align-items:flex-end;gap:12px;
    background:rgba(11,17,22,.88);border:1px solid var(--line);border-radius:12px;padding:10px 14px;pointer-events:auto;}
  #portrait{width:58px;height:58px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:900;border:2px solid rgba(255,255,255,.7);position:relative;}
  #plv{position:absolute;bottom:-6px;right:-6px;background:#0b1116;border:1px solid var(--gold);color:var(--gold);
    border-radius:50%;width:22px;height:22px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:800;}
  #midcol{display:flex;flex-direction:column;gap:5px;width:300px;}
  .barwrap{height:15px;background:#0a0f13;border:1px solid var(--line);border-radius:4px;position:relative;overflow:hidden;}
  .barwrap .fill{position:absolute;inset:0;transform-origin:left;border-radius:3px;}
  #hpfill{background:linear-gradient(180deg,#7fe693,var(--hp));}
  #shfill{background:rgba(255,255,255,.75);}
  #mpfill{background:linear-gradient(180deg,#7db9ef,var(--mana));}
  .barlabel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10.5px;
    color:#fff;text-shadow:0 1px 2px #000;font-weight:700;}
  #xpbar{height:4px;background:#0a0f13;border-radius:2px;overflow:hidden;}
  #xpfill{height:100%;background:var(--gold);width:0%;}
  #abilities{display:flex;gap:8px;}
  .ab{width:52px;height:52px;background:#141f27;border:1px solid #3a4f5e;border-radius:8px;position:relative;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;}
  .ab .k{position:absolute;top:2px;left:5px;font-size:10px;color:var(--gold);font-weight:800;}
  .ab .ic{font-size:19px;line-height:1;margin-top:6px;}
  .ab .nm{font-size:8.5px;color:var(--dim);white-space:nowrap;}
  .ab .cdov{position:absolute;inset:0;background:rgba(5,8,10,.78);border-radius:7px;display:flex;align-items:center;
    justify-content:center;font-size:17px;font-weight:800;color:#fff;}
  .ab.nomana{box-shadow:inset 0 0 0 2px rgba(63,143,224,.65);}
  #rightcol{display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
  #goldrow{color:var(--gold);font-weight:800;font-size:15px;}
  #kdarow{font-size:12px;color:var(--dim);}
  #itemrow{display:flex;gap:4px;}
  .islot{width:24px;height:24px;background:#141f27;border:1px solid var(--line);border-radius:5px;
    display:flex;align-items:center;justify-content:center;font-size:13px;}
  #shopBtn,#recallBtn{pointer-events:auto;background:#1a2731;border:1px solid #3a4f5e;color:var(--ink);border-radius:6px;
    padding:3px 10px;font-size:11px;cursor:pointer;}
  #shopBtn:hover,#recallBtn:hover{background:#243642;}

  /* ミニマップ */
  #minimapWrap{position:absolute;right:10px;bottom:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden;
    background:#0a0f13;}
  #minimap{display:block;}

  /* ショップ */
  #shop{position:absolute;right:200px;bottom:10px;width:330px;background:rgba(11,17,22,.95);border:1px solid var(--line);
    border-radius:12px;padding:14px;display:none;pointer-events:auto;}
  #shop h4{color:var(--gold);letter-spacing:.2em;font-size:13px;margin-bottom:4px;}
  #shopNote{font-size:11px;color:var(--dim);margin-bottom:10px;}
  #shopGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .sitem{background:#141f27;border:1px solid #33475a;border-radius:8px;padding:8px;cursor:pointer;font-size:12px;}
  .sitem:hover{border-color:var(--gold);}
  .sitem .cost{color:var(--gold);font-weight:800;}
  .sitem .eff{color:var(--dim);font-size:11px;}
  .sitem.poor{opacity:.4;cursor:default;}
  #pstats{margin-top:10px;font-size:11px;color:var(--dim);line-height:1.7;}

  /* スコアボード */
  #board{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(5,8,10,.55);}
  #boardIn{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:18px 26px;min-width:560px;}
  #boardIn h4{text-align:center;letter-spacing:.25em;color:var(--dim);font-size:12px;margin-bottom:10px;}
  .brow{display:grid;grid-template-columns:26px 1fr 70px 60px 40px;gap:10px;font-size:13px;padding:3px 2px;align-items:center;}
  .brow.head{color:var(--dim);font-size:11px;border-bottom:1px solid var(--line);margin-bottom:4px;}
  .bdiv{height:10px;}

  /* リスポーン/終了 */
  #deathOv{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
    background:radial-gradient(ellipse at center, rgba(60,0,0,.35), rgba(5,8,10,.6));}
  #deathOv .big{font-size:30px;font-weight:900;letter-spacing:.2em;color:#ffb3b3;text-shadow:0 2px 12px #000;}
  #deathOv .cnt{font-size:52px;font-weight:900;color:#fff;margin-top:6px;}
  #endOv{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    background:rgba(5,8,10,.78);pointer-events:auto;z-index:60;}
  #endTitle{font-size:64px;font-weight:900;letter-spacing:.22em;text-shadow:0 4px 30px rgba(0,0,0,.9);}
  #endStats{color:var(--dim);font-size:14px;}
  #againBtn{padding:10px 46px;font-size:15px;font-weight:800;letter-spacing:.15em;color:#0d1512;border:none;border-radius:8px;
    background:linear-gradient(180deg,#ffe9ad,var(--gold));cursor:pointer;}

  #hint{position:absolute;top:52px;left:12px;background:rgba(11,17,22,.8);border:1px solid var(--line);border-radius:8px;
    padding:8px 12px;font-size:11.5px;color:var(--dim);line-height:1.8;}
  #hint kbd{background:#1c2830;border:1px solid var(--line);border-radius:3px;padding:0 5px;color:var(--ink);font-size:10px;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="select">
  <h1>NEXUS CLASH</h1>
  <div class="sub">LoL-STYLE MINI MOBA — 5 v 5</div>
  <div id="cards"></div>
  <button id="startBtn">出撃する</button>
  <div id="selHint">
    <kbd>右/左クリック</kbd> 移動・攻撃　<kbd>Q</kbd><kbd>W</kbd><kbd>R</kbd> スキル（マウス方向）　<kbd>B</kbd> リコール　<kbd>P</kbd> ショップ（拠点内）　<kbd>Tab</kbd> スコアボード<br>
    ミニオンにラストヒットしてゴールドを稼ぎ、タワーを折って敵ネクサスを破壊せよ。
  </div>
</div>

<div id="hud">
  <div id="topbar">
    <span class="tk blue" id="tkb">0</span>
    <span id="clock" class="mono">0:00</span>
    <span class="tk red" id="tkr">0</span>
    <span id="csDisp" style="color:var(--dim);font-size:12px;">CS 0</span>
  </div>
  <div id="announce"></div>
  <div id="toast"></div>
  <div id="feed"></div>
  <div id="hint">
    <kbd>Q/W/R</kbd> スキル　<kbd>B</kbd> リコール　<kbd>P</kbd> ショップ　<kbd>Tab</kbd> スコア<br>
    まずはミニオンのラストヒットでゴールドを稼ごう
  </div>

  <div id="console">
    <div id="portrait"><span id="pk">葵</span><div id="plv">1</div></div>
    <div id="midcol">
      <div class="barwrap"><div class="fill" id="shfill" style="transform:scaleX(0)"></div><div class="fill" id="hpfill"></div><div class="barlabel" id="hplabel"></div></div>
      <div class="barwrap" style="height:12px"><div class="fill" id="mpfill"></div><div class="barlabel" id="mplabel" style="font-size:9.5px"></div></div>
      <div id="xpbar"><div id="xpfill"></div></div>
      <div id="abilities">
        <div class="ab" data-k="Q"><span class="k">Q</span><span class="ic"></span><span class="nm"></span></div>
        <div class="ab" data-k="W"><span class="k">W</span><span class="ic"></span><span class="nm"></span></div>
        <div class="ab" data-k="R"><span class="k">R</span><span class="ic"></span><span class="nm"></span></div>
      </div>
    </div>
    <div id="rightcol">
      <div id="goldrow">◈ <span id="goldv">500</span></div>
      <div id="kdarow">0 / 0 / 0</div>
      <div id="itemrow"></div>
      <div style="display:flex;gap:5px;">
        <button id="shopBtn">ショップ(P)</button><button id="recallBtn">リコール(B)</button>
      </div>
    </div>
  </div>

  <div id="minimapWrap"><canvas id="minimap" width="176" height="176"></canvas></div>

  <div id="shop">
    <h4>SHOP</h4>
    <div id="shopNote">自軍の拠点（噴水）内でのみ購入できます。所持枠は6個。</div>
    <div id="shopGrid"></div>
    <div id="pstats"></div>
  </div>

  <div id="board"><div id="boardIn"></div></div>
  <div id="deathOv"><div class="big">倒されました</div><div class="cnt" id="deathCnt">5</div></div>
  <div id="endOv"><div id="endTitle"></div><div id="endStats"></div><button id="againBtn">チャンピオン選択に戻る</button></div>
</div>
<script>
'use strict';
/* =====================================================
   NEXUS CLASH — LoL風ミニMOBA (オリジナル実装)
   ===================================================== */
const WORLD = 3200;
const BLUE = 0, RED = 1;
const BASE = [{x:340,y:2860},{x:2860,y:340}];
const TEAM_COL = ['#4da3ff','#ff5c5c'];
const TEAM_DARK = ['#173b63','#5e1f1f'];

const LANE_PATHS = {
  top: [[470,2720],[340,2350],[340,760],[430,430],[760,340],[2350,340],[2720,470]],
  mid: [[500,2700],[1120,2080],[1600,1600],[2080,1120],[2700,500]],
  bot: [[480,2730],[850,2860],[2440,2860],[2770,2750],[2860,2440],[2860,850],[2730,480]]
};
const LANES = ['top','mid','bot'];
// PATHS[team][lane] : 自陣→敵陣 順のウェイポイント
const PATHS = [{},{}];
for(const L of LANES){ PATHS[BLUE][L]=LANE_PATHS[L]; PATHS[RED][L]=[...LANE_PATHS[L]].reverse(); }

const BUSHES = [
  {x:1300,y:1220,r:120},{x:1900,y:1980,r:120},
  {x:980,y:1770,r:100},{x:2220,y:1430,r:100},
  {x:820,y:2600,r:95},{x:2380,y:600,r:95}
];

/* ---------- チャンピオン定義 (完全オリジナル) ---------- */
const CHAMP_DEFS = {
  aoi:{ key:'aoi', name:'アオイ', kanji:'葵', role:'メイジ', ranged:true, atkRange:330,
    hp:560, hpL:84, mana:430, manaL:46, ad:52, adL:3.1, baseMs:190, baseAs:0.72, r:16,
    intro:'遠距離から魔法を叩き込む砲台型メイジ。',
    Q:{name:'光弾', icon:'✦', type:'skillshot', cd:5, mana:45, range:950, speed:850, radius:24,
       dmg:c=>60+c.level*14+AP(c)*0.7, slow:0.3, slowDur:1.2,
       desc:'マウス方向に魔法弾。命中でダメージ+スロー'},
    W:{name:'瞬歩', icon:'✧', type:'blink', cd:14, mana:60, range:280,
       desc:'マウス方向へ短距離ワープ'},
    R:{name:'極光レーザー', icon:'☀', type:'beam', cd:55, mana:100, range:1050, width:64,
       dmg:c=>180+c.level*12+AP(c)*1.0,
       desc:'直線上の敵全てに大ダメージ'} },
  renji:{ key:'renji', name:'レンジ', kanji:'連', role:'マークスマン', ranged:true, atkRange:360,
    hp:540, hpL:80, mana:300, manaL:34, ad:58, adL:3.8, baseMs:190, baseAs:0.80, r:16,
    intro:'通常攻撃で削り切る後衛アタッカー。',
    Q:{name:'貫矢', icon:'➹', type:'skillshot', cd:6, mana:40, range:1000, speed:1000, radius:20, pierce:true,
       dmg:c=>55+c.level*8+AD(c)*0.8,
       desc:'敵を貫通する矢を放つ'},
    W:{name:'疾風の構え', icon:'༄', type:'frenzy', cd:14, mana:50, dur:4, asBuff:0.6, haste:0.2,
       desc:'4秒間 攻撃速度+60%・移動+20%'},
    R:{name:'超長距離狙撃', icon:'◎', type:'skillshot', cd:60, mana:100, range:1500, speed:1250, radius:28,
       dmg:c=>230+c.level*10+AD(c)*1.2,
       desc:'超射程の狙撃弾。命中で大ダメージ'} },
  gantetsu:{ key:'gantetsu', name:'ガンテツ', kanji:'岩', role:'タンク', ranged:false, atkRange:95,
    hp:760, hpL:112, mana:280, manaL:32, ad:60, adL:3.6, baseMs:185, baseAs:0.68, r:18,
    intro:'前線で殴り合う重装ファイター。',
    Q:{name:'大地割り', icon:'❖', type:'aoe', cd:7, mana:45, radius:210,
       dmg:c=>70+c.level*10+cMaxHp(c)*0.04, slow:0.4, slowDur:1.5,
       desc:'周囲の敵にダメージ+スロー'},
    W:{name:'鉄壁', icon:'⛨', type:'shield', cd:12, mana:50, dur:3, val:c=>110+c.level*26,
       desc:'3秒間シールドを得る'},
    R:{name:'轟天跳躍', icon:'☄', type:'leap', cd:60, mana:100, range:520, radius:180, stun:0.8,
       dmg:c=>150+c.level*12+cMaxHp(c)*0.06,
       desc:'跳躍して着地点の敵をスタン'} },
  shinobu:{ key:'shinobu', name:'シノブ', kanji:'忍', role:'アサシン', ranged:false, atkRange:95,
    hp:600, hpL:90, mana:320, manaL:36, ad:64, adL:4.2, baseMs:200, baseAs:0.75, r:16,
    intro:'一瞬で懐に潜り込む暗殺者。',
    Q:{name:'影襲', icon:'⟫', type:'dashHit', cd:6, mana:40, range:380, width:60,
       dmg:c=>60+c.level*9+AD(c)*0.8,
       desc:'マウス方向へ突進し通過した敵にダメージ'},
    W:{name:'隠密', icon:'☁', type:'stealth', cd:16, mana:55, dur:2.5, haste:0.3,
       desc:'2.5秒間 姿を消し移動+30%'},
    R:{name:'処刑', icon:'✖', type:'execute', cd:50, mana:100, range:330, thresh:0.35,
       dmg:c=>150+c.level*12+AD(c)*1.0,
       desc:'近くの敵チャンピオンに大ダメージ。HP35%未満なら2倍'} }
};
const CHAMP_KEYS = Object.keys(CHAMP_DEFS);

/* ---------- アイテム ---------- */
const ITEMS = [
  {id:0,icon:'⚔',name:'ロングソード',cost:350,eff:'攻撃力 +10',ad:10},
  {id:1,icon:'📘',name:'増魔の書',cost:400,eff:'魔力 +20',ap:20},
  {id:2,icon:'♥',name:'ルビー水晶',cost:400,eff:'体力 +150',hp:150},
  {id:3,icon:'👢',name:'俊足の靴',cost:300,eff:'移動速度 +28 (1足のみ)',ms:28,unique:true},
  {id:4,icon:'🗡',name:'B.F.グレートソード',cost:1300,eff:'攻撃力 +40',ad:40},
  {id:5,icon:'🎩',name:'大魔道士の帽子',cost:1600,eff:'魔力 +85',ap:85},
  {id:6,icon:'🛡',name:'巨人の腰帯',cost:1000,eff:'体力 +380',hp:380},
  {id:7,icon:'⚡',name:'狂戦士の篭手',cost:900,eff:'攻撃速度 +30%',as:0.30}
];

const AI_NAMES = ['ユキ','ハヤテ','ツバキ','カエデ','ソラ','リン','タケル','ミナト','アカネ','ヒバリ'];

/* ---------- 汎用ヘルパー ---------- */
let uidc = 1;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const distXY=(a,x,y)=>Math.hypot(a.x-x,a.y-y);
function pointAlongPath(path, frac){
  let total=0; const segs=[];
  for(let i=0;i<path.length-1;i++){const d=Math.hypot(path[i+1][0]-path[i][0],path[i+1][1]-path[i][1]);segs.push(d);total+=d;}
  let target=frac*total;
  for(let i=0;i<segs.length;i++){
    if(target<=segs[i]){const t=target/segs[i];
      return {x:path[i][0]+(path[i+1][0]-path[i][0])*t, y:path[i][1]+(path[i+1][1]-path[i][1])*t};}
    target-=segs[i];
  }
  const last=path[path.length-1]; return {x:last[0],y:last[1]};
}
function pointToSegDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay;const L2=dx*dx+dy*dy;
  let t=L2?((px-ax)*dx+(py-ay)*dy)/L2:0;t=clamp(t,0,1);
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
function bushAt(x,y){
  for(const b of BUSHES){ if(Math.hypot(x-b.x,y-b.y)<b.r) return b; }
  return null;
}

/* ---------- ステータス計算 ---------- */
function AD(c){return c.def.ad + c.def.adL*(c.level-1) + c.bonus.ad;}
function AP(c){return c.bonus.ap;}
function cMaxHp(c){return Math.round(c.def.hp + c.def.hpL*(c.level-1) + c.bonus.hp);}
function cMaxMana(c){return Math.round(c.def.mana + c.def.manaL*(c.level-1));}
function effMS(u){
  const base=u.baseMs + (u.bonus?u.bonus.ms:0);
  return base*(1-(u.slowT>0?u.slowPow:0))*(1+(u.hasteT>0?u.hastePow:0));
}
function atkSpd(u){return u.baseAs*(1+(u.bonus?u.bonus.as:0)+(u.asBuffT>0?u.asBuffPow:0));}
function xpNeed(l){return 160+110*(l-1);}

function spawnTower(team, lane, tier){

function spawnMinion(team, lane, mtype){

function spawnWaves(){

/* ---------- 無敵判定 (タワー段階制) ---------- */
function towersOf(team,lane){
  const res={t1:null,t2:null};
  for(const u of units) if(u.kind==='tower'&&u.team===team&&u.lane===lane){
    if(u.tier===1)res.t1=u; else res.t2=u;
  }
  return res;
}
function isInvulnerable(u){
  if(u.kind==='tower'&&u.tier===2){
    const t=towersOf(u.team,u.lane); return !!(t.t1&&!t.t1.dead);
  }
  if(u.kind==='nexus'){
    // どこか1レーンのタワー2本が両方折れていれば攻撃可能
    for(const lane of LANES){
      const t=towersOf(u.team,lane);
      const t1dead=!t.t1||t.t1.dead, t2dead=!t.t2||t.t2.dead;
      if(t1dead&&t2dead) return false;
    }
    return true;
  }
  return false;
}

/* =====================================================
   戦闘・ターゲティング・ダメージ
   ===================================================== */
function visibleToTeam(team,t){
  if(t.team===team) return true;
  if(t.stealthT>0) return false;
  if(t.bush){
    for(const u of units){
      if(u.dead||u.team!==team) continue;
      if(u.bush===t.bush || dist(u,t)<140) return true;
    }
    return false;
  }
  return true;
}
function targetable(u,t){
  if(!t||t.dead) return false;
  if(isInvulnerable(t)) return false;
  if(t.stealthT>0) return false;
  if((t.kind==='champ'||t.kind==='minion') && !visibleToTeam(u.team,t)) return false;
  return true;
}
function nearestEnemy(u,range,pred){
  let best=null,bd=range;
  for(const e of units){
    if(e.dead||e.team===u.team) continue;
    if(pred&&!pred(e)) continue;
    if(!targetable(u,e)) continue;
    const d=dist(u,e)-(e.r||0);
    if(d<bd){bd=d;best=e;}
  }
  return best;
}
function moveStep(u,tx,ty,dt){
  const d=distXY(u,tx,ty); if(d<1) return;
  const sp=effMS(u)*dt, k=Math.min(1,sp/d);
  u.x=clamp(u.x+(tx-u.x)*k,24,WORLD-24);
  u.y=clamp(u.y+(ty-u.y)*k,24,WORLD-24);
}
function addDmgText(t,amt,col){
  if(amt<1) return;
  dmgTexts.push({x:t.x+rnd(-12,12),y:t.y-t.r-8,txt:String(Math.round(amt)),col:col||'#fff',t:0,dur:0.9});
}
function grantGold(c,amt){
  if(!c||c.kind!=='champ') return;
  c.gold+=amt;
  if(c.isPlayer) dmgTexts.push({x:c.x,y:c.y-c.r-26,txt:'+'+amt+'G',col:'#e8c15a',t:0,dur:1.0});
}
function grantXp(c,amt){
  if(!c||c.kind!=='champ'||c.level>=18) return;
  c.xp+=amt;
  while(c.level<18 && c.xp>=xpNeed(c.level)){
    c.xp-=xpNeed(c.level);
    const oh=cMaxHp(c), om=cMaxMana(c);
    c.level++;
    c.hp+=cMaxHp(c)-oh; c.mana+=cMaxMana(c)-om;
    fx.push({type:'ring',x:c.x,y:c.y,r0:10,r1:60,col:'#e8c15a',t:0,dur:0.6,follow:c});
    if(c.isPlayer) toast('レベルアップ！ Lv'+c.level);
  }
}
function applyDamage(src,tgt,amt,col){
  if(!tgt||tgt.dead||isInvulnerable(tgt)) return;
  if(tgt.shield>0){
    const a=Math.min(tgt.shield,amt); tgt.shield-=a; amt-=a;
    if(amt<=0){ addDmgText(tgt,a,'#cfd8dc'); return; }
  }
  tgt.hp-=amt;
  addDmgText(tgt,amt,col|| (src&&src.kind==='champ'&&src.isPlayer?'#ffe9ad':'#ff9d9d'));
  tgt.lastHitBy=src||tgt.lastHitBy;
  if(tgt.kind==='champ'){
    if(tgt.recallT>0){ tgt.recallT=0; if(tgt.isPlayer) toast('リコールが中断された！'); }
    if(src&&src.kind==='champ'){
      tgt.recentDmg[src.id]=gtime;
      // タワーアグロ: 味方チャンピオンを攻撃した敵をタワーが狙う
      for(const tw of units){
        if(tw.kind==='tower'&&!tw.dead&&tw.team===tgt.team&&dist(tw,src)<tw.atkRange+30) tw.attackTarget=src;
      }
    }
  }
  if(tgt.hp<=0) killUnit(src,tgt);
}
function killUnit(src,tgt){
  if(tgt.dead) return;
  tgt.dead=true; tgt.attackTarget=null; tgt.moveTarget=null; tgt.dash=null;
  const srcChamp = (src&&src.kind==='champ')?src:null;
  fx.push({type:'ring',x:tgt.x,y:tgt.y,r0:tgt.r*0.5,r1:tgt.r*2.2,col:TEAM_COL[tgt.team],t:0,dur:0.4});

  if(tgt.kind==='minion'){
    if(srcChamp){ grantGold(srcChamp,tgt.gold); srcChamp.stats.cs++; }
    for(const c of units) if(c.kind==='champ'&&!c.dead&&c.team!==tgt.team&&dist(c,tgt)<900) grantXp(c,58);
    return;
  }
  if(tgt.kind==='champ'){
    const killerTeam=1-tgt.team;
    teamKills[killerTeam]++;
    tgt.stats.d++;
    tgt.respT=Math.min(32, 5+1.7*tgt.level);
    const rd=tgt.recentDmg;
    tgt.recentDmg={}; tgt.recallT=0; tgt.stealthT=0;
    let killerName='ミニオン';
    if(srcChamp){
      killerName=srcChamp.name;
      srcChamp.stats.k++;
      let g=300;
      if(!firstBlood){ firstBlood=true; g+=100; announce('ファーストブラッド！','#e8c15a'); }
      grantGold(srcChamp,g); grantXp(srcChamp,200+26*tgt.level);
      if(srcChamp.isPlayer) toast('敵チャンピオン撃破！');
      // アシスト
      for(const c of units){
        if(c.kind!=='champ'||c===srcChamp||c.team!==killerTeam) continue;
        const t0=rd[c.id];
        if(t0!==undefined && gtime-t0<10){ c.stats.a++; grantGold(c,130); grantXp(c,120); }
      }
    } else if(src&&src.kind==='tower'){ killerName='タワー'; }
    feed(killerTeam, killerName, tgt.team, tgt.name);
    if(tgt.isPlayer) announce('倒された…','#ff8080',1.6);
    return;
  }
  if(tgt.kind==='tower'){
    announce((tgt.team===BLUE?'味方':'敵の')+'タワーが破壊された！', tgt.team===BLUE?'#ff8080':'#9fd3ff');
    if(srcChamp) grantGold(srcChamp,250);
    for(const c of units) if(c.kind==='champ'&&c.team!==tgt.team) grantGold(c===srcChamp?null:c,100);
    return;
  }
  if(tgt.kind==='nexus'){ endGame(1-tgt.team); }
}

/* ---------- 攻撃 ---------- */
function fireAttack(u,t){
  const dmg = u.kind==='champ'? AD(u) : u.adFlat;
  if(u.ranged){
    projs.push({homing:t,x:u.x,y:u.y,speed:u.kind==='tower'?720:980,dmg,src:u,
      col:u.kind==='tower'?'#ffd27a':(u.team===BLUE?'#9fd3ff':'#ffb09f'),r:u.kind==='tower'?8:4.5});
  }else{
    applyDamage(u,t,dmg);
    fx.push({type:'slash',x:t.x,y:t.y,t:0,dur:0.18,col:'#fff'});
  }
}
function updateProjs(dt){
  for(const p of projs){
    if(p.dead) continue;
    if(p.homing){
      const t=p.homing;
      if(t.dead){p.dead=true;continue;}
      const d=dist(p,t);
      const step=p.speed*dt;
      if(d<=t.r+8||step>=d){ applyDamage(p.src,t,p.dmg); p.dead=true; continue; }
      p.x+=(t.x-p.x)/d*step; p.y+=(t.y-p.y)/d*step;
    }else{
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.trav+=p.speed*dt;
      for(const e of units){
        if(e.dead||e.team===p.team) continue;
        if(e.kind!=='champ'&&e.kind!=='minion') continue;
        if(p.hit[e.id]) continue;
        if(dist(p,e)<p.radius+e.r){
          applyDamage(p.src,e,p.dmg,'#d6b3ff');
          if(p.slow){ e.slowT=Math.max(e.slowT,p.slowDur); e.slowPow=Math.max(e.slowPow,p.slow); }
          p.hit[e.id]=1;
          if(!p.pierce){ p.dead=true; break; }
        }
      }
      if(p.trav>=p.range) p.dead=true;
    }
  }
  projs=projs.filter(p=>!p.dead);
}

/* ---------- スキル ---------- */
function cancelRecall(c){ if(c.recallT>0){ c.recallT=0; if(c.isPlayer) toast('リコール中断'); } }
function startRecall(c){
  if(c.dead||c.recallT>0) return;
  c.recallT=4; c.moveTarget=null; c.attackTarget=null;
  if(c.isPlayer) toast('リコール中… (4秒)');
}
function tryCast(c,K,ax,ay){
  if(c.dead||c.stunT>0) return false;
  const ab=c.def[K]; if(!ab) return false;
  if(c.cds[K]>0){ if(c.isPlayer) toast('クールダウン中 ('+Math.ceil(c.cds[K])+'s)'); return false; }
  if(c.mana<ab.mana){ if(c.isPlayer) toast('マナが足りない'); return false; }
  if(ab.type==='execute'){
    const t=nearestEnemy(c,ab.range,u=>u.kind==='champ');
    if(!t){ if(c.isPlayer) toast('射程内に敵チャンピオンがいない'); return false; }
  }
  c.mana-=ab.mana; c.cds[K]=ab.cd; cancelRecall(c);
  execAbility(c,ab,ax,ay);
  return true;
}
function dirTo(c,ax,ay){
  let dx=ax-c.x, dy=ay-c.y; const d=Math.hypot(dx,dy);
  if(d<1){dx=1;dy=0;return [dx,dy];}
  return [dx/d,dy/d];
}
function execAbility(c,ab,ax,ay){
  const magic='#d6b3ff';
  switch(ab.type){
    case 'skillshot':{
      const [dx,dy]=dirTo(c,ax,ay);
      projs.push({x:c.x+dx*c.r,y:c.y+dy*c.r,vx:dx*ab.speed,vy:dy*ab.speed,speed:ab.speed,
        range:ab.range,trav:0,radius:ab.radius,dmg:ab.dmg(c),src:c,team:c.team,
        pierce:!!ab.pierce,slow:ab.slow||0,slowDur:ab.slowDur||0,hit:{},skill:true,
        col:c.team===BLUE?'#7fd0ff':'#ff9f7f'});
      break;}
    case 'blink':{
      const [dx,dy]=dirTo(c,ax,ay);
      const len=Math.min(ab.range,distXY(c,ax,ay));
      fx.push({type:'ring',x:c.x,y:c.y,r0:6,r1:34,col:'#fff',t:0,dur:0.3});
      c.x=clamp(c.x+dx*len,24,WORLD-24); c.y=clamp(c.y+dy*len,24,WORLD-24);
      fx.push({type:'ring',x:c.x,y:c.y,r0:6,r1:34,col:'#fff',t:0,dur:0.3});
      break;}
    case 'beam':{
      const [dx,dy]=dirTo(c,ax,ay);
      const x2=c.x+dx*ab.range, y2=c.y+dy*ab.range;
      for(const e of units){
        if(e.dead||e.team===c.team) continue;
        if(e.kind!=='champ'&&e.kind!=='minion') continue;
        if(pointToSegDist(e.x,e.y,c.x,c.y,x2,y2)<ab.width/2+e.r) applyDamage(c,e,ab.dmg(c),magic);
      }
      fx.push({type:'beam',x1:c.x,y1:c.y,x2,y2,w:ab.width,col:c.team===BLUE?'#bfe6ff':'#ffc9b3',t:0,dur:0.3});
      break;}
    case 'frenzy':
      c.asBuffT=ab.dur; c.asBuffPow=ab.asBuff;
      c.hasteT=ab.dur; c.hastePow=ab.haste;
      fx.push({type:'ring',x:c.x,y:c.y,r0:8,r1:42,col:'#ffe9ad',t:0,dur:0.4,follow:c});
      break;
    case 'shield':
      c.shield=ab.val(c); c.shieldT=ab.dur;
      fx.push({type:'ring',x:c.x,y:c.y,r0:c.r,r1:c.r+16,col:'#cfd8dc',t:0,dur:0.4,follow:c});
      break;
    case 'aoe':{
      for(const e of units){
        if(e.dead||e.team===c.team) continue;
        if(e.kind!=='champ'&&e.kind!=='minion') continue;
        if(dist(c,e)<ab.radius+e.r){
          applyDamage(c,e,ab.dmg(c),magic);
          e.slowT=Math.max(e.slowT,ab.slowDur); e.slowPow=Math.max(e.slowPow,ab.slow);
        }
      }
      fx.push({type:'ring',x:c.x,y:c.y,r0:20,r1:ab.radius,col:'#e0b060',t:0,dur:0.4});
      break;}
    case 'leap':{
      const [dx,dy]=dirTo(c,ax,ay);
      const len=Math.min(ab.range,distXY(c,ax,ay));
      const tx=clamp(c.x+dx*len,24,WORLD-24), ty=clamp(c.y+dy*len,24,WORLD-24);
      c.attackTarget=null; c.moveTarget=null;
      c.dash={tx,ty,speed:950,onLand:(u)=>{
        for(const e of units){
          if(e.dead||e.team===u.team) continue;
          if(e.kind!=='champ'&&e.kind!=='minion') continue;
          if(dist(u,e)<ab.radius+e.r){ applyDamage(u,e,ab.dmg(u),magic); e.stunT=Math.max(e.stunT,ab.stun); }
        }
        fx.push({type:'ring',x:u.x,y:u.y,r0:20,r1:ab.radius,col:'#ffb060',t:0,dur:0.45});
      }};
      break;}
    case 'dashHit':{
      const [dx,dy]=dirTo(c,ax,ay);
      const len=Math.min(ab.range,Math.max(140,distXY(c,ax,ay)));
      const tx=clamp(c.x+dx*len,24,WORLD-24), ty=clamp(c.y+dy*len,24,WORLD-24);
      for(const e of units){
        if(e.dead||e.team===c.team) continue;
        if(e.kind!=='champ'&&e.kind!=='minion') continue;
        if(pointToSegDist(e.x,e.y,c.x,c.y,tx,ty)<ab.width+e.r) applyDamage(c,e,ab.dmg(c),'#ffd7a0');
      }
      fx.push({type:'beam',x1:c.x,y1:c.y,x2:tx,y2:ty,w:30,col:'#c7d3da',t:0,dur:0.22});
      c.dash={tx,ty,speed:1500,onLand:null};
      break;}
    case 'stealth':
      c.stealthT=ab.dur; c.hasteT=ab.dur; c.hastePow=ab.haste;
      for(const e of units) if(e.attackTarget===c&&e.team!==c.team) e.attackTarget=null;
      fx.push({type:'ring',x:c.x,y:c.y,r0:8,r1:36,col:'#9aa7b0',t:0,dur:0.4});
      break;
    case 'execute':{
      const t=nearestEnemy(c,ab.range,u=>u.kind==='champ');
      if(t){
        const mult = t.hp/t.maxHp<ab.thresh ? 2:1;
        applyDamage(c,t,ab.dmg(c)*mult,'#ff6b6b');
        fx.push({type:'slash',x:t.x,y:t.y,t:0,dur:0.3,col:'#ff6b6b',big:true});
      }
      break;}
  }
}

   AI

const AI_DT=0.18;
function countAllyMinionsNear(c,range){
  let n=0;
  for(const u of units) if(u.kind==='minion'&&!u.dead&&u.team===c.team&&dist(u,c)<range) n++;
  return n;
}
function resyncWp(c){
  const path=PATHS[c.team][c.lane];
  let bi=1,bd=1e9;
  for(let i=0;i<path.length-1;i++){
    const d=pointToSegDist(c.x,c.y,path[i][0],path[i][1],path[i+1][0],path[i+1][1]);
    if(d<bd){bd=d;bi=i+1;}
  }
  c.wp=bi;
}
function laneAdvance(c){
  const path=PATHS[c.team][c.lane];
  if(c.wp>=path.length){ c.moveTarget={x:BASE[1-c.team].x,y:BASE[1-c.team].y}; return; }
  let p=path[c.wp];
  if(distXY(c,p[0],p[1])>1400){
    resyncWp(c); p=path[c.wp];
  }
  if(distXY(c,p[0],p[1])<80){ c.wp++; if(c.wp>=path.length){c.moveTarget={x:BASE[1-c.team].x,y:BASE[1-c.team].y};return;} p=path[c.wp]; }
  c.moveTarget={x:p[0],y:p[1]};
}
function aiShop(c){
  let guard=0;
  while(guard++<10 && c.items.length<6){
    const opts=ITEMS.filter(it=>it.cost<=c.gold && !(it.unique&&c.items.some(o=>o.id===it.id)));
    if(!opts.length) break;
    buyItem(c,opts[Math.floor(Math.random()*opts.length)]);
  }
}
function aiAbilities(c,tgt){
  const def=c.def, d=dist(c,tgt), hpr=c.hp/c.maxHp;
  if(c.cds.Q<=0 && c.mana>=def.Q.mana){
    const qr=def.Q.range||def.Q.radius||300;
    if(d<qr*0.9) tryCast(c,'Q',tgt.x,tgt.y);
  }
  if(c.cds.W<=0 && c.mana>=def.W.mana){
    if((def.W.type==='shield'||def.W.type==='stealth') && hpr<0.5) tryCast(c,'W',c.x,c.y);
    else if(def.W.type==='frenzy' && tgt.kind==='champ' && d<c.atkRange+80) tryCast(c,'W',c.x,c.y);
    else if(def.W.type==='blink' && hpr<0.35){ const b=BASE[c.team]; tryCast(c,'W',b.x,b.y); }
  }
  if(c.cds.R<=0 && c.mana>=def.R.mana && tgt.kind==='champ'){
    const rr=def.R.range||400;
    if(tgt.hp/tgt.maxHp<0.55 && d<rr*0.9) tryCast(c,'R',tgt.x,tgt.y);
  }
}
function runAI(c){
  if(c.dead||c.recallT>0||c.dash) return;
  const hpr=c.hp/c.maxHp;
  if(c.aiState!=='retreat' && hpr<0.30){ c.aiState='retreat'; c.attackTarget=null; c.safeT=0; }
  if(c.aiState==='retreat'){
    if(hpr>0.92){ c.aiState='push'; resyncWp(c); return; }
    const near=nearestEnemy(c,700,u=>u.kind==='champ'||u.kind==='minion');
    if(!near) c.safeT+=AI_DT; else c.safeT=0;
    const b=BASE[c.team];
    if(distXY(c,b.x,b.y)<240){ aiShop(c); c.moveTarget=null; }
    else if(c.safeT>2.2){ startRecall(c); }
    else { c.moveTarget={x:b.x,y:b.y}; c.attackTarget=null; }
    return;
  }
  // 通常時: 拠点に戻ったついでに買い物
  if(distXY(c,BASE[c.team].x,BASE[c.team].y)<240) aiShop(c);
  let tgt=nearestEnemy(c,560,u=>u.kind==='champ');
  if(!tgt) tgt=nearestEnemy(c,500,u=>u.kind==='minion');
  if(!tgt){
    const st=nearestEnemy(c,Math.max(c.atkRange+160,430),u=>u.kind==='tower'||u.kind==='nexus');
    if(st && (countAllyMinionsNear(c,420)>=1 || st.hp<st.maxHp*0.3 || st.kind==='nexus')) tgt=st;
    else if(st){ // ミニオン到着待ち: タワー射程外で待機
      c.attackTarget=null;
      c.moveTarget={x:clamp(c.x+(c.x-st.x)*0.4,24,WORLD-24), y:clamp(c.y+(c.y-st.y)*0.4,24,WORLD-24)};
      return;
    }
  }
  if(tgt){
    if(tgt.kind==='champ'){
      const tw=nearestEnemy(c,370,u=>u.kind==='tower');
      if(tw && countAllyMinionsNear(c,360)<2 && tgt.hp/tgt.maxHp>0.18){
        c.attackTarget=null;
        c.moveTarget={x:clamp(c.x+(c.x-tw.x)*0.9,24,WORLD-24), y:clamp(c.y+(c.y-tw.y)*0.9,24,WORLD-24)};
        return;
      }
    }
    c.attackTarget=tgt; c.moveTarget=null;
    aiAbilities(c,tgt);
  } else {
    c.attackTarget=null;
    laneAdvance(c);
  }
}

/* =====================================================
   ユニット更新
   ===================================================== */
function minionAcquire(m,dt){
  m.reacq-=dt;
  if(m.attackTarget){
    const t=m.attackTarget;
    if(t.dead||!targetable(m,t)||dist(m,t)>m.atkRange+260) m.attackTarget=null;
  }
  if(!m.attackTarget && m.reacq<=0){
    m.reacq=0.5;
    m.attackTarget = nearestEnemy(m,m.atkRange+300,u=>u.kind!=='champ')
                  || nearestEnemy(m,m.atkRange+220,u=>u.kind==='champ');
  }
}
function towerAcquire(tw,dt){
  tw.reacq-=dt;
  if(tw.attackTarget){
    const t=tw.attackTarget;
    if(t.dead||!targetable(tw,t)||dist(tw,t)-t.r>tw.atkRange) tw.attackTarget=null;
  }
  if(!tw.attackTarget && tw.reacq<=0){
    tw.reacq=0.25;
    tw.attackTarget = nearestEnemy(tw,tw.atkRange,u=>u.kind==='minion')
                   || nearestEnemy(tw,tw.atkRange,u=>u.kind==='champ');
  }
}
function champTick(c,dt){
  c.maxHp=cMaxHp(c); c.maxMana=cMaxMana(c);
  for(const k of ['Q','W','R']) c.cds[k]=Math.max(0,c.cds[k]-dt);
  // パッシブゴールド
  c.gold+=2.2*dt;
  // 自然回復
  c.hp=Math.min(c.maxHp, c.hp + c.maxHp*0.006*dt);
  c.mana=Math.min(c.maxMana, c.mana + c.maxMana*0.014*dt);
  // 噴水回復
  const b=BASE[c.team];
  if(distXY(c,b.x,b.y)<260){
    c.hp=Math.min(c.maxHp, c.hp + c.maxHp*0.16*dt);
    c.mana=Math.min(c.maxMana, c.mana + c.maxMana*0.2*dt);
  }
  // リコール完了
  if(c.recallT>0){
    c.recallT-=dt;
    if(c.recallT<=0){
      c.x=b.x+rnd(-40,40); c.y=b.y+rnd(-40,40);
      c.moveTarget=null; c.attackTarget=null;
      fx.push({type:'ring',x:c.x,y:c.y,r0:10,r1:70,col:'#9fd3ff',t:0,dur:0.5});
    }
  }
}
function dashTick(u,dt){
  const d=distXY(u,u.dash.tx,u.dash.ty);
  const step=u.dash.speed*dt;
  if(step>=d){
    u.x=u.dash.tx; u.y=u.dash.ty;
    const f=u.dash.onLand; u.dash=null;
    if(f) f(u);
  }else{
    u.x+=(u.dash.tx-u.x)/d*step; u.y+=(u.dash.ty-u.y)/d*step;
  }
}
function updateUnit(u,dt){
  u.stunT=Math.max(0,u.stunT-dt);
  u.slowT=Math.max(0,u.slowT-dt); if(u.slowT<=0)u.slowPow=0;
  u.hasteT=Math.max(0,u.hasteT-dt); if(u.hasteT<=0)u.hastePow=0;
  u.asBuffT=Math.max(0,u.asBuffT-dt); if(u.asBuffT<=0)u.asBuffPow=0;
  u.shieldT=Math.max(0,u.shieldT-dt); if(u.shieldT<=0)u.shield=0;
  u.stealthT=Math.max(0,u.stealthT-dt);
  u.swing=Math.max(0,u.swing-dt);
  if(u.kind==='champ') champTick(u,dt);
  if(u.dead) return; // 噴水レーザー等で死亡した場合
  if(u.stunT>0) return;
  if(u.kind==='champ'&&u.recallT>0) return; // リコール詠唱中は行動不可
  if(u.dash){ dashTick(u,dt); return; }
  if(u.kind==='minion') minionAcquire(u,dt);
  if(u.kind==='tower') towerAcquire(u,dt);
  if(u.kind==='nexus') return;

  if(u.attackTarget){
    const t=u.attackTarget;
    if(t.dead||!targetable(u,t)){ u.attackTarget=null; }
  }
  if(u.attackTarget){
    const t=u.attackTarget, d=dist(u,t)-t.r;
    if(d>u.atkRange){
      if(u.kind==='tower'){ u.attackTarget=null; }
      else moveStep(u,t.x,t.y,dt);
    }else{
      u.moveTarget=null;
      if(u.swing<=0){ fireAttack(u,t); u.swing=1/atkSpd(u); }
    }
    return;
  }
  if(u.moveTarget){
    if(distXY(u,u.moveTarget.x,u.moveTarget.y)<10){ u.moveTarget=null; }
    else moveStep(u,u.moveTarget.x,u.moveTarget.y,dt);
  }else if(u.kind==='minion'){
    const path=PATHS[u.team][u.lane];
    if(u.wp>=path.length){ moveStep(u,BASE[1-u.team].x,BASE[1-u.team].y,dt); }
    else{
      const p=path[u.wp];
      if(distXY(u,p[0],p[1])<55) u.wp++;
      else moveStep(u,p[0],p[1],dt);
    }
  }else if(u.kind==='champ'&&u.isPlayer){
    const t=nearestEnemy(u,u.atkRange+6,()=>true);
    if(t) u.attackTarget=t;
  }
}
function reviveChamp(c){
  c.dead=false;
  c.maxHp=cMaxHp(c); c.hp=c.maxHp;
  c.maxMana=cMaxMana(c); c.mana=c.maxMana;
  const b=BASE[c.team];
  c.x=b.x+rnd(-60,60); c.y=b.y+rnd(-60,60);
  c.wp=0; c.aiState='push'; c.attackTarget=null; c.moveTarget=null;
  c.stunT=0; c.slowT=0; c.slowPow=0; c.stealthT=0; c.shield=0;
  fx.push({type:'ring',x:c.x,y:c.y,r0:12,r1:70,col:TEAM_COL[c.team],t:0,dur:0.5});
}
function fountains(dt){
  for(const c of units){
    if(c.kind!=='champ'||c.dead) continue;
    const eb=BASE[1-c.team];
    if(distXY(c,eb.x,eb.y)<250){
      c.fAcc=(c.fAcc||0)+dt;
      if(c.fAcc>0.4){ c.fAcc=0; applyDamage(null,c,240,'#ff8080'); }
    }
  }
}
function updateFx(dt){
  for(const f of fx) f.t+=dt;
  fx=fx.filter(f=>f.t<f.dur);
  for(const d of dmgTexts) d.t+=dt;
  dmgTexts=dmgTexts.filter(d=>d.t<d.dur);
}

/* ---------- メイン更新 ---------- */
function update(dt){
  if(!running||gameOver) return;
  gtime+=dt; if(hintT>0) hintT-=dt;
  waveT-=dt; if(waveT<=0){ spawnWaves(); waveT=22; }
  for(const u of units) u.bush=(u.kind==='champ'||u.kind==='minion')?bushAt(u.x,u.y):null;
  aiT-=dt; const doAI=aiT<=0; if(doAI) aiT=AI_DT;
  for(const u of units){
    if(u.dead){
      if(u.kind==='champ'){ u.respT-=dt; if(u.respT<=0) reviveChamp(u); }
      continue;
    }
    updateUnit(u,dt);
    if(doAI&&u.kind==='champ'&&!u.isPlayer&&!u.dead) runAI(u);
  }
  updateProjs(dt);
  fountains(dt);
  updateFx(dt);
  units=units.filter(u=>!u.dead||u.kind==='champ');
}

function drawUnit(u){
  if(u.stealthT>0) ctx.globalAlpha=0.45;
  if(u.kind==='nexus'){
    const s=u.r*(1+Math.sin(gtime*3)*0.06);
    ctx.save(); ctx.translate(u.x,u.y); ctx.rotate(Math.PI/4);
    ctx.fillStyle=TEAM_DARK[u.team]; ctx.strokeStyle=TEAM_COL[u.team]; ctx.lineWidth=5;
    ctx.fillRect(-s,-s,s*2,s*2); ctx.strokeRect(-s,-s,s*2,s*2);
    ctx.restore();
    if(isInvulnerable(u)){
      ctx.fillStyle='rgba(210,220,228,0.9)'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText('無敵',u.x,u.y+5);
    }
  }else if(u.kind==='tower'){
    ctx.fillStyle='#1c2a24'; ctx.strokeStyle=TEAM_COL[u.team]; ctx.lineWidth=4;
    ctx.fillRect(u.x-16,u.y-6,32,30); ctx.strokeRect(u.x-16,u.y-6,32,30);
    ctx.beginPath(); ctx.arc(u.x,u.y-15,13,0,7);
    ctx.fillStyle=isInvulnerable(u)?'#5a6a72':TEAM_COL[u.team]; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.stroke();
  }else if(u.kind==='minion'){
    ctx.beginPath(); ctx.arc(u.x,u.y,u.r,0,7);
    ctx.fillStyle=TEAM_DARK[u.team]; ctx.fill();
    ctx.lineWidth=2.5; ctx.strokeStyle=TEAM_COL[u.team]; ctx.stroke();
    if(u.ranged){ ctx.beginPath(); ctx.arc(u.x,u.y,3,0,7); ctx.fillStyle=TEAM_COL[u.team]; ctx.fill(); }
  }else{
    if(u.isPlayer){
      ctx.beginPath(); ctx.arc(u.x,u.y,u.r+6,0,7);
      ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(u.x,u.y,u.r,0,7);
    ctx.fillStyle=TEAM_COL[u.team]; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle='rgba(8,14,14,0.85)'; ctx.stroke();

      const pr=(4-u.recallT)/4;
      ctx.beginPath(); ctx.arc(u.x,u.y,u.r+10+pr*16,0,7);
      ctx.strokeStyle='rgba(159,211,255,0.8)'; ctx.lineWidth=3; ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
}
function drawBar(u){
  const w=u.kind==='champ'?46:u.kind==='tower'?56:u.kind==='nexus'?84:26;
  const h=u.kind==='minion'?4:6;
  const x=u.x-w/2, y=u.y-u.r-(u.kind==='tower'?32:14)-h;
  ctx.fillStyle='rgba(5,10,8,0.8)'; ctx.fillRect(x-1,y-1,w+2,h+2);
  const myTeam=player?player.team:BLUE;
  const hpw=w*clamp(u.hp/u.maxHp,0,1);
  ctx.fillStyle=u.team===myTeam?'#4fd06a':'#ff5c5c';
  ctx.fillRect(x,y,hpw,h);
  if(u.shield>0){
    const sw=Math.min(w*clamp(u.shield/u.maxHp,0,1), w-hpw);
    ctx.fillStyle='rgba(230,238,242,0.9)'; ctx.fillRect(x+hpw,y,sw,h);
  }
  if(u.kind==='champ'){
    ctx.fillStyle='rgba(63,143,224,0.95)';
    ctx.fillRect(x,y+h+1,w*clamp(u.mana/u.maxMana,0,1),2.5);
    ctx.fillStyle='rgba(5,10,8,0.85)'; ctx.fillRect(x-15,y-3,13,13);
    ctx.fillStyle='#e8c15a'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(u.level,x-8.5,y+7);
    ctx.fillStyle=u.isPlayer?'rgba(255,236,170,0.95)':'rgba(232,238,242,0.72)';
    ctx.font='9px sans-serif'; ctx.fillText(u.name,u.x,y-4);
  }
}
function draw(){
  ctx.fillStyle='#0b0f0d'; ctx.fillRect(0,0,vw,vh);
  if(!running) return;
  const myTeam=player?player.team:BLUE;
  ctx.save(); ctx.translate(-camX,-camY);
  ctx.drawImage(groundCv,0,0,groundCv.width,groundCv.height,0,0,WORLD,WORLD);
  // 攻撃対象マーカー
  if(player&&player.attackTarget&&!player.attackTarget.dead){
    const t=player.attackTarget;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r+7,0,7);
    ctx.strokeStyle='rgba(255,90,90,0.9)'; ctx.lineWidth=2; ctx.stroke();
  }
  const visible=[];
  for(const u of units){
    if(u.dead) continue;
    if(u.team!==myTeam&&(u.kind==='champ'||u.kind==='minion')&&!visibleToTeam(myTeam,u)) continue;
    visible.push(u);
  }
  for(const u of visible) if(u.kind==='nexus'||u.kind==='tower') drawUnit(u);
  for(const u of visible) if(u.kind==='minion') drawUnit(u);
  for(const u of visible) if(u.kind==='champ') drawUnit(u);
  // 弾
  for(const p of projs){
    const r=p.skill?p.radius*0.5+4:p.r;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,7); ctx.fillStyle=p.col; ctx.fill();
    ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.arc(p.x,p.y,r+3,0,7); ctx.strokeStyle=p.col; ctx.lineWidth=2; ctx.stroke();
    ctx.globalAlpha=1;
  }
  // エフェクト
  for(const f of fx){
    const k=f.t/f.dur, a=1-k;
    ctx.globalAlpha=a;
    if(f.type==='ring'){
      const x=f.follow?f.follow.x:f.x, y=f.follow?f.follow.y:f.y;
      ctx.beginPath(); ctx.arc(x,y,f.r0+(f.r1-f.r0)*k,0,7);
      ctx.strokeStyle=f.col; ctx.lineWidth=3; ctx.stroke();
    }else if(f.type==='beam'){
      ctx.strokeStyle=f.col; ctx.lineWidth=f.w*(0.5+0.5*a); ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(f.x1,f.y1); ctx.lineTo(f.x2,f.y2); ctx.stroke();
    }else if(f.type==='slash'){
      const s=f.big?26:13;
      ctx.strokeStyle=f.col; ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(f.x-s,f.y-s); ctx.lineTo(f.x+s,f.y+s);
      ctx.moveTo(f.x+s,f.y-s); ctx.lineTo(f.x-s,f.y+s);
      ctx.stroke();
    }else if(f.type==='click'){
      ctx.beginPath(); ctx.arc(f.x,f.y,6+k*14,0,7);
      ctx.strokeStyle='#7fe693'; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  // ブッシュを薄く上描き(潜んでいる感)
  for(const b of BUSHES){
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7);
    ctx.fillStyle='rgba(38,88,44,0.30)'; ctx.fill();
  }
  for(const u of visible) drawBar(u);
  // ダメージ数字
  ctx.textAlign='center'; ctx.font='bold 13px sans-serif';
  for(const d of dmgTexts){
    const k=d.t/d.dur;
    ctx.globalAlpha=1-k;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillText(d.txt,d.x+1,d.y-34*d.t+1);
    ctx.fillStyle=d.col; ctx.fillText(d.txt,d.x,d.y-34*d.t);
  }
  ctx.globalAlpha=1;
  ctx.restore();
}
function drawMinimap(){
  const S=176/WORLD;
  mmc.fillStyle='#0b120e'; mmc.fillRect(0,0,176,176);
  mmc.strokeStyle='rgba(60,130,150,0.55)'; mmc.lineWidth=6; mmc.lineCap='round';
  mmc.beginPath(); mmc.moveTo(790*S,790*S); mmc.lineTo(2410*S,2410*S); mmc.stroke();
  mmc.strokeStyle='rgba(140,126,90,0.7)'; mmc.lineWidth=3; mmc.lineJoin='round';
  for(const L of LANES){
    const p=LANE_PATHS[L];
    mmc.beginPath(); mmc.moveTo(p[0][0]*S,p[0][1]*S);
    for(let i=1;i<p.length;i++) mmc.lineTo(p[i][0]*S,p[i][1]*S);
    mmc.stroke();
  }
  const myTeam=player?player.team:BLUE;
  for(const u of units){
    if(u.dead) continue;
    if(u.team!==myTeam&&(u.kind==='champ'||u.kind==='minion')&&!visibleToTeam(myTeam,u)) continue;
    const x=u.x*S, y=u.y*S;
    if(u.kind==='tower'){ mmc.fillStyle=TEAM_COL[u.team]; mmc.fillRect(x-2.5,y-2.5,5,5); }
    else if(u.kind==='nexus'){ mmc.fillStyle=TEAM_COL[u.team]; mmc.beginPath(); mmc.arc(x,y,4.5,0,7); mmc.fill(); }
    else if(u.kind==='minion'){ mmc.fillStyle=TEAM_COL[u.team]; mmc.fillRect(x-1,y-1,2.2,2.2); }
    else{
      mmc.beginPath(); mmc.arc(x,y,3.6,0,7); mmc.fillStyle=TEAM_COL[u.team]; mmc.fill();
      if(u.isPlayer){ mmc.strokeStyle='#fff'; mmc.lineWidth=1.5; mmc.stroke(); }
    }
  }
  mmc.strokeStyle='rgba(255,255,255,0.4)'; mmc.lineWidth=1;
  mmc.strokeRect(camX*S,camY*S,vw*S,vh*S);
}

/* =====================================================
   HUD / ショップ / スコアボード
   ===================================================== */
let announceTid=null, toastTid=null, shopOpen=false, boardOpen=false;
let lastItemCount=-1, lastBoardTick=-1;
function announce(text,color,dur){
  announceEl.textContent=text;
  announceEl.style.color=color||'#fff';
  announceEl.style.opacity=1;
  if(announceTid) clearTimeout(announceTid);
  announceTid=setTimeout(()=>{announceEl.style.opacity=0;},(dur||2.2)*1000);
}
function toast(text){
  toastEl.textContent=text;
  toastEl.style.opacity=1;
  if(toastTid) clearTimeout(toastTid);
  toastTid=setTimeout(()=>{toastEl.style.opacity=0;},1500);
}
function feed(kTeam,kName,vTeam,vName){
  const row=document.createElement('div');
  row.className='feedrow';
  row.innerHTML='<span class="'+(kTeam===BLUE?'fb':'fr')+'">'+kName+'</span> が <span class="'+(vTeam===BLUE?'fb':'fr')+'">'+vName+'</span> を倒した';
  feedEl.prepend(row);
  while(feedEl.children.length>5) feedEl.removeChild(feedEl.lastChild);
  setTimeout(()=>{ if(row.parentNode) row.parentNode.removeChild(row); },7000);
}
function clockStr(t){
  const m=Math.floor(t/60), s=Math.floor(t%60);
  return m+':'+(s<10?'0':'')+s;
}
function buyItem(c,it){
  if(!c||c.items.length>=6) return false;
  if(it.unique&&c.items.some(o=>o.id===it.id)) return false;
  if(c.gold<it.cost) return false;
  c.gold-=it.cost; c.items.push(it);
  c.bonus.ad+=it.ad||0; c.bonus.ap+=it.ap||0;
  c.bonus.hp+=it.hp||0; c.bonus.ms+=it.ms||0; c.bonus.as+=it.as||0;
  c.hp+=it.hp||0;
  return true;
}
function buildShop(){
  shopGridEl.innerHTML='';
  for(const it of ITEMS){
    const d=document.createElement('div');
    d.className='sitem'; d.dataset.id=it.id;
    d.innerHTML=it.icon+' <b>'+it.name+'</b> <span class="cost">'+it.cost+'G</span><div class="eff">'+it.eff+'</div>';
    d.onclick=()=>{
      if(!player||player.dead) return;
      const b=BASE[player.team];
      if(distXY(player,b.x,b.y)>260){ toast('ショップは自軍拠点内でのみ使える'); return; }
      if(player.items.length>=6){ toast('アイテム枠がいっぱい'); return; }
      if(it.unique&&player.items.some(o=>o.id===it.id)){ toast(it.name+'は1つしか持てない'); return; }
      if(player.gold<it.cost){ toast('ゴールドが足りない'); return; }
      buyItem(player,it);
      toast(it.name+' を購入！');
      refreshShop();
    };
    shopGridEl.appendChild(d);
  }
}
function refreshShop(){
  if(!player) return;
  for(const d of shopGridEl.children){
    const it=ITEMS[+d.dataset.id];
    const poor=player.gold<it.cost||player.items.length>=6||(it.unique&&player.items.some(o=>o.id===it.id));
    d.classList.toggle('poor',poor);
  }
  pstatsEl.textContent='攻撃力 '+Math.round(AD(player))+' ／ 魔力 '+Math.round(AP(player))
    +' ／ 体力 '+Math.ceil(Math.max(0,player.hp))+'/'+player.maxHp
    +' ／ 移速 '+Math.round(effMS(player))+' ／ 攻速 '+atkSpd(player).toFixed(2);
}
function toggleShop(){
  if(shopOpen){ closeShop(); return; }
  if(!player||player.dead) return;
  const b=BASE[player.team];
  if(distXY(player,b.x,b.y)>260){ toast('ショップは自軍拠点内でのみ開ける'); return; }
  shopOpen=true; shopEl.style.display='block'; refreshShop();
}
function closeShop(){ shopOpen=false; shopEl.style.display='none'; }
function buildBoard(){
  let html='<h4>SCOREBOARD (Tab)</h4>';
  html+='<div class="brow head"><span></span><span>プレイヤー</span><span>K/D/A</span><span>CS</span><span>Lv</span></div>';
  const row=c=>'<div class="brow"><span style="color:'+TEAM_COL[c.team]+';font-weight:900">'+c.kanji+'</span>'
    +'<span>'+(c.isPlayer?'★ ':'')+c.name+' <span style="color:var(--dim);font-size:11px">'+c.def.name+'</span></span>'
    +'<span>'+c.stats.k+'/'+c.stats.d+'/'+c.stats.a+'</span><span>'+c.stats.cs+'</span><span>'+c.level+'</span></div>';
  for(const c of units) if(c.kind==='champ'&&c.team===BLUE) html+=row(c);
  html+='<div class="bdiv"></div>';
  for(const c of units) if(c.kind==='champ'&&c.team===RED) html+=row(c);
  boardInEl.innerHTML=html;
}
let abSlots=[];
function setupAbilityBar(){
  abSlots=Array.prototype.slice.call(document.querySelectorAll('#abilities .ab'));
  for(const slot of abSlots){
    const K=slot.dataset.k, ab=player.def[K];
    const ic=slot.querySelector('.ic'), nm=slot.querySelector('.nm');
    if(ic) ic.textContent=ab.icon;
    if(nm) nm.textContent=ab.name;
    let ov=slot.querySelector('.cdov');
    if(!ov){ ov=document.createElement('div'); ov.className='cdov'; slot.appendChild(ov); }
    ov.style.display='none'; slot._ov=ov;
    slot.title=ab.name+'：'+ab.desc+'（マナ'+ab.mana+' / CD'+ab.cd+'s）';
    slot.onclick=()=>{
      if(!player||player.dead) return;
      const t=player.attackTarget||nearestEnemy(player,900,()=>true);
      tryCast(player,K,t?t.x:mouse.wx,t?t.y:mouse.wy);
    };
  }
}
function renderItems(){
  let html='';
  for(let i=0;i<6;i++){
    const it=player&&player.items[i];
    html+='<div class="islot" title="'+(it?it.name:'')+'">'+(it?it.icon:'')+'</div>';
  }
  itemrowEl.innerHTML=html;
}
function updateHUD(){
  clockEl.textContent=clockStr(gtime);
  tkbEl.textContent=teamKills[BLUE];
  tkrEl.textContent=teamKills[RED];
  if(!player) return;
  csEl.textContent='CS '+player.stats.cs;
  const hpr=clamp(player.hp/player.maxHp,0,1);
  hpfillEl.style.transform='scaleX('+hpr+')';
  shfillEl.style.transform='scaleX('+clamp((Math.max(0,player.hp)+player.shield)/player.maxHp,0,1)+')';
  hplabelEl.textContent=Math.ceil(Math.max(0,player.hp))+' / '+player.maxHp;
  mpfillEl.style.transform='scaleX('+clamp(player.mana/player.maxMana,0,1)+')';
  mplabelEl.textContent=Math.floor(player.mana)+' / '+player.maxMana;
  xpfillEl.style.width=(player.level>=18?100:player.xp/xpNeed(player.level)*100)+'%';
  plvEl.textContent=player.level;
  goldvEl.textContent=Math.floor(player.gold);
  kdarowEl.textContent=player.stats.k+' / '+player.stats.d+' / '+player.stats.a;
  for(const slot of abSlots){
    const K=slot.dataset.k, ab=player.def[K], cd=player.cds[K];
    if(cd>0){ slot._ov.style.display='flex'; slot._ov.textContent=Math.ceil(cd); }
    else slot._ov.style.display='none';
    slot.classList.toggle('nomana',player.mana<ab.mana);
  }
  if(player.items.length!==lastItemCount){ lastItemCount=player.items.length; renderItems(); }
  if(player.dead){ deathOvEl.style.display='flex'; deathCntEl.textContent=Math.ceil(player.respT); }
  else deathOvEl.style.display='none';
  hintEl.style.display=hintT>0?'block':'none';
  if(shopOpen){
    const b=BASE[player.team];
    if(player.dead||distXY(player,b.x,b.y)>280) closeShop();
    else refreshShop();
  }
  if(boardOpen){
    const tick=Math.floor(gtime*2);
    if(tick!==lastBoardTick){ lastBoardTick=tick; buildBoard(); }
  }
}

/* =====================================================
   入力
   ===================================================== */
cnv.addEventListener('contextmenu',e=>e.preventDefault());
cnv.addEventListener('mousemove',e=>{
  const r=cnv.getBoundingClientRect();
  mouse.sx=e.clientX-r.left; mouse.sy=e.clientY-r.top;
});
cnv.addEventListener('mousedown',e=>{
  if(!running||gameOver||!player||player.dead) return;
  e.preventDefault();
  const r=cnv.getBoundingClientRect();
  const wx=e.clientX-r.left+camX, wy=e.clientY-r.top+camY;
  let hit=null,bd=26;
  for(const u of units){
    if(u.dead||u.team===player.team) continue;
    if(!targetable(player,u)) continue;
    const d=Math.hypot(u.x-wx,u.y-wy)-u.r;
    if(d<bd){bd=d;hit=u;}
  }
  cancelRecall(player);
  if(hit){ player.attackTarget=hit; player.moveTarget=null; }
  else{
    player.moveTarget={x:clamp(wx,24,WORLD-24),y:clamp(wy,24,WORLD-24)};
    player.attackTarget=null;
    fx.push({type:'click',x:wx,y:wy,t:0,dur:0.4});
  }
});
window.addEventListener('keydown',e=>{
  if(!running||gameOver) return;
  if(e.key==='Tab'){
    e.preventDefault();
    if(!boardOpen){ boardOpen=true; boardEl.style.display='flex'; lastBoardTick=-1; }
    return;
  }
  if(!player) return;
  const k=e.key.toLowerCase();
  if(k==='escape'){ closeShop(); return; }
  if(player.dead) return;
  if(k==='q'||k==='w'||k==='r') tryCast(player,k.toUpperCase(),mouse.wx,mouse.wy);
  else if(k==='b') startRecall(player);
  else if(k==='p') toggleShop();
});
window.addEventListener('keyup',e=>{
  if(e.key==='Tab'){ boardOpen=false; boardEl.style.display='none'; }
});
$('shopBtn').onclick=()=>toggleShop();
$('recallBtn').onclick=()=>{ if(player&&!player.dead) startRecall(player); };

/* =====================================================
   ゲームフロー
   ===================================================== */
let selKey=null;
function buildSelect(){
  cardsEl.innerHTML='';
  for(const key of CHAMP_KEYS){
    const d=CHAMP_DEFS[key];
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML='<div class="emblem" style="background:'+EMBLEM_COL[key]+'">'+d.kanji+'</div>'
      +'<h3>'+d.name+'</h3><div class="role">'+d.role+'</div>'
      +'<div class="skills" style="margin-bottom:8px;color:#b9c8d1">'+d.intro+'</div>'
      +'<div class="skills"><b>Q '+d.Q.name+'</b>：'+d.Q.desc+'<br><b>W '+d.W.name+'</b>：'+d.W.desc+'<br><b>R '+d.R.name+'</b>：'+d.R.desc+'</div>';
    div.onclick=()=>{
      selKey=key;
      for(const c of cardsEl.children) c.classList.remove('sel');
      div.classList.add('sel');
      startBtnEl.classList.add('on');
    };
    cardsEl.appendChild(div);
  }
}
function randChamp(){ return CHAMP_KEYS[Math.floor(Math.random()*CHAMP_KEYS.length)]; }
function startGame(key){
  units=[]; projs=[]; fx=[]; dmgTexts=[];
  gtime=0; waveT=6; aiT=0; teamKills=[0,0];
  firstBlood=false; gameOver=false; hintT=45; uidc=1;
  lastItemCount=-1; shopOpen=false; boardOpen=false;
  for(const team of [BLUE,RED]){
    spawnNexus(team);
    for(const lane of LANES){ spawnTower(team,lane,1); spawnTower(team,lane,2); }
  }
  const names=[...AI_NAMES].sort(()=>Math.random()-0.5);
  let ni=0;
  player=spawnChampion(BLUE,key,'mid',true,'あなた');
  for(const l of ['top','mid','bot','bot']) spawnChampion(BLUE,randChamp(),l,false,names[ni++]);
  for(const l of ['top','mid','mid','bot','bot']) spawnChampion(RED,randChamp(),l,false,names[ni++]);
  selectEl.style.display='none';
  hudEl.style.display='block';
  endOvEl.style.display='none';
  shopEl.style.display='none';
  boardEl.style.display='none';
  feedEl.innerHTML='';
  pkEl.textContent=player.kanji;
  portraitEl.style.background=EMBLEM_COL[key];
  setupAbilityBar(); buildShop(); renderItems();
  running=true;
  announce('バトル開始！ 敵ネクサスを破壊せよ','#9fd3ff',2.6);
}
function endGame(winner){
  if(gameOver) return;
  gameOver=true;
  endTitleEl.textContent=winner===BLUE?'VICTORY':'DEFEAT';
  endTitleEl.style.color=winner===BLUE?'#e8c15a':'#ff8080';
  endStatsEl.textContent='あなた：'+player.stats.k+' / '+player.stats.d+' / '+player.stats.a
    +'　CS '+player.stats.cs+'　Lv'+player.level+'　試合時間 '+clockStr(gtime);
  endOvEl.style.display='flex';
}
function resetToSelect(){
  running=false; gameOver=false;
  units=[]; projs=[]; fx=[]; dmgTexts=[]; player=null;
  hudEl.style.display='none';
  endOvEl.style.display='none';
  selectEl.style.display='flex';
  selKey=null; startBtnEl.classList.remove('on');
  for(const c of cardsEl.children) c.classList.remove('sel');
}
startBtnEl.onclick=()=>{ if(selKey) startGame(selKey); };
$('againBtn').onclick=()=>resetToSelect();

/* ---------- メインループ ---------- */
let lastT=(typeof performance!=='undefined'?performance.now():0);
function loop(now){
  const dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  mouse.wx=mouse.sx+camX; mouse.wy=mouse.sy+camY;
  if(running&&!gameOver) update(dt);
  updateCam();
  draw();
  if(running){ updateHUD(); drawMinimap(); }
  requestAnimationFrame(loop);
}
window.addEventListener('resize',resize);
resize(); renderGround(); buildSelect();
if(typeof requestAnimationFrame==='function') requestAnimationFrame(loop);

// テスト用フック
window.NX={ startGame, step:update,
  get units(){return units;}, get player(){return player;},
  get gtime(){return gtime;}, get gameOver(){return gameOver;},
  get teamKills(){return teamKills;}, tryCast, applyDamage };
</script>
